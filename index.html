<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Music Player - Free & Legal Music Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .track-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .track-item.active {
            background: rgba(99, 102, 241, 0.3);
            border-left: 3px solid #6366f1;
        }
        
        input[type="range"] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            height: 6px;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #6366f1;
            border-radius: 50%;
            cursor: pointer;
        }
        
        .pulse-animation {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .spin-animation {
            animation: spin 3s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-500 rounded-lg flex items-center justify-center">
                    <i class="fas fa-music text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold">Open Music Player</h1>
            </div>
            <div class="text-sm text-gray-400">
                <i class="fas fa-heart text-red-500 mr-1"></i> Free & Legal Music
            </div>
        </header>

        <!-- Search Bar -->
        <div class="glass-effect rounded-xl p-4 mb-6">
            <div class="flex gap-4">
                <div class="flex-1 relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Search for tracks, artists..." 
                        class="w-full bg-white/10 rounded-lg py-3 pl-12 pr-4 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    >
                </div>
                <button 
                    id="searchBtn" 
                    class="bg-indigo-500 hover:bg-indigo-600 px-6 py-3 rounded-lg font-medium transition-colors"
                >
                    Search
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Track List -->
            <div class="lg:col-span-2">
                <div class="glass-effect rounded-xl p-6">
                    <h2 class="text-xl font-semibold mb-4">Tracks</h2>
                    <div id="trackList" class="space-y-2 max-h-96 overflow-y-auto">
                        <div class="text-center text-gray-400 py-8">
                            <i class="fas fa-music text-4xl mb-3"></i>
                            <p>Search for music to get started</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Now Playing -->
            <div class="lg:col-span-1">
                <div class="glass-effect rounded-xl p-6 sticky top-8">
                    <h2 class="text-xl font-semibold mb-4">Now Playing</h2>
                    
                    <!-- Album Art -->
                    <div id="albumArt" class="w-full aspect-square bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl mb-4 flex items-center justify-center">
                        <i class="fas fa-music text-6xl text-white/50"></i>
                    </div>
                    
                    <!-- Track Info -->
                    <div id="trackInfo" class="mb-4">
                        <h3 id="trackTitle" class="font-semibold text-lg truncate">No track selected</h3>
                        <p id="trackArtist" class="text-gray-400 truncate">-</p>
                    </div>
                    
                    <!-- Progress Bar -->
                    <div class="mb-4">
                        <input 
                            type="range" 
                            id="progressBar" 
                            class="w-full" 
                            value="0" 
                            min="0" 
                            max="100"
                        >
                        <div class="flex justify-between text-sm text-gray-400 mt-1">
                            <span id="currentTime">0:00</span>
                            <span id="duration">0:00</span>
                        </div>
                    </div>
                    
                    <!-- Controls -->
                    <div class="flex items-center justify-center gap-4 mb-4">
                        <button id="shuffleBtn" class="text-gray-400 hover:text-white transition-colors">
                            <i class="fas fa-random text-lg"></i>
                        </button>
                        <button id="prevBtn" class="text-white hover:text-indigo-400 transition-colors">
                            <i class="fas fa-step-backward text-2xl"></i>
                        </button>
                        <button id="playPauseBtn" class="w-14 h-14 bg-indigo-500 hover:bg-indigo-600 rounded-full flex items-center justify-center transition-colors">
                            <i class="fas fa-play text-xl" id="playPauseIcon"></i>
                        </button>
                        <button id="nextBtn" class="text-white hover:text-indigo-400 transition-colors">
                            <i class="fas fa-step-forward text-2xl"></i>
                        </button>
                        <button id="repeatBtn" class="text-gray-400 hover:text-white transition-colors">
                            <i class="fas fa-redo text-lg"></i>
                        </button>
                    </div>
                    
                    <!-- Volume -->
                    <div class="flex items-center gap-3">
                        <i class="fas fa-volume-up text-gray-400"></i>
                        <input 
                            type="range" 
                            id="volumeBar" 
                            class="flex-1" 
                            value="80" 
                            min="0" 
                            max="100"
                        >
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-8 text-center text-gray-400 text-sm">
            <p>Powered by Jamendo API - All music is royalty-free and legal to stream</p>
        </footer>
    </div>

    <!-- Audio Element -->
    <audio id="audioPlayer"></audio>

    <script>
        // State
        let tracks = [];
        let currentTrackIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let isRepeat = false;
        
        // DOM Elements
        const audioPlayer = document.getElementById('audioPlayer');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const trackList = document.getElementById('trackList');
        const albumArt = document.getElementById('albumArt');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playPauseIcon = document.getElementById('playPauseIcon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const repeatBtn = document.getElementById('repeatBtn');
        const volumeBar = document.getElementById('volumeBar');
        
        // Jamendo API Client ID (free tier)
        const CLIENT_ID = 'c4ce16c7';
        
        // Search for tracks
        async function searchTracks(query) {
            try {
                const response = await fetch(
                    `https://api.jamendo.com/v3.0/tracks/?client_id=${CLIENT_ID}&format=jsonpretty&limit=20&search=${encodeURIComponent(query)}&include=musicinfo&imagesize=500`
                );
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    tracks = data.results;
                    renderTrackList();
                } else {
                    trackList.innerHTML = `
                        <div class="text-center text-gray-400 py-8">
                            <i class="fas fa-search text-4xl mb-3"></i>
                            <p>No tracks found. Try a different search.</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error searching tracks:', error);
                trackList.innerHTML = `
                    <div class="text-center text-red-400 py-8">
                        <i class="fas fa-exclamation-circle text-4xl mb-3"></i>
                        <p>Error loading tracks. Please try again.</p>
                    </div>
                `;
            }
        }
        
        // Render track list
        function renderTrackList() {
            trackList.innerHTML = tracks.map((track, index) => `
                <div class="track-item p-3 rounded-lg cursor-pointer transition-colors ${index === currentTrackIndex ? 'active' : ''}" data-index="${index}">
                    <div class="flex items-center gap-3">
                        <img 
                            src="${track.image || 'https://via.placeholder.com/50'}" 
                            alt="${track.name}" 
                            class="w-12 h-12 rounded object-cover"
                            onerror="this.src='https://via.placeholder.com/50'"
                        >
                        <div class="flex-1 min-w-0">
                            <h4 class="font-medium truncate">${track.name}</h4>
                            <p class="text-sm text-gray-400 truncate">${track.artist_name}</p>
                        </div>
                        <span class="text-sm text-gray-400">${formatTime(track.duration)}</span>
                    </div>
                </div>
            `).join('');
            
            // Add click listeners
            document.querySelectorAll('.track-item').forEach(item => {
                item.addEventListener('click', () => {
                    const index = parseInt(item.dataset.index);
                    playTrack(index);
                });
            });
        }
        
        // Play track
        function playTrack(index) {
            currentTrackIndex = index;
            const track = tracks[index];
            
            audioPlayer.src = track.audio;
            audioPlayer.play();
            isPlaying = true;
            updatePlayPauseButton();
            updateNowPlaying(track);
            renderTrackList();
        }
        
        // Update now playing
        function updateNowPlaying(track) {
            trackTitle.textContent = track.name;
            trackArtist.textContent = track.artist_name;
            
            if (track.image) {
                albumArt.innerHTML = `<img src="${track.image}" alt="${track.name}" class="w-full h-full object-cover rounded-xl">`;
            } else {
                albumArt.innerHTML = `<i class="fas fa-music text-6xl text-white/50"></i>`;
            }
        }
        
        // Update play/pause button
        function updatePlayPauseButton() {
            if (isPlaying) {
                playPauseIcon.classList.remove('fa-play');
                playPauseIcon.classList.add('fa-pause');
            } else {
                playPauseIcon.classList.remove('fa-pause');
                playPauseIcon.classList.add('fa-play');
            }
        }
        
        // Format time
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        // Event Listeners
        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query) {
                searchTracks(query);
            }
        });
        
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) {
                    searchTracks(query);
                }
            }
        });
        
        playPauseBtn.addEventListener('click', () => {
            if (tracks.length === 0) return;
            
            if (isPlaying) {
                audioPlayer.pause();
                isPlaying = false;
            } else {
                audioPlayer.play();
                isPlaying = true;
            }
            updatePlayPauseButton();
        });
        
        prevBtn.addEventListener('click', () => {
            if (tracks.length === 0) return;
            
            if (isShuffle) {
                currentTrackIndex = Math.floor(Math.random() * tracks.length);
            } else {
                currentTrackIndex = (currentTrackIndex - 1 + tracks.length) % tracks.length;
            }
            playTrack(currentTrackIndex);
        });
        
        nextBtn.addEventListener('click', () => {
            if (tracks.length === 0) return;
            
            if (isShuffle) {
                currentTrackIndex = Math.floor(Math.random() * tracks.length);
            } else {
                currentTrackIndex = (currentTrackIndex + 1) % tracks.length;
            }
            playTrack(currentTrackIndex);
        });
        
        shuffleBtn.addEventListener('click', () => {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('text-indigo-500', isShuffle);
            shuffleBtn.classList.toggle('text-gray-400', !isShuffle);
        });
        
        repeatBtn.addEventListener('click', () => {
            isRepeat = !isRepeat;
            repeatBtn.classList.toggle('text-indigo-500', isRepeat);
            repeatBtn.classList.toggle('text-gray-400', !isRepeat);
            audioPlayer.loop = isRepeat;
        });
        
        volumeBar.addEventListener('input', (e) => {
            audioPlayer.volume = e.target.value / 100;
        });
        
        progressBar.addEventListener('input', (e) => {
            const time = (e.target.value / 100) * audioPlayer.duration;
            audioPlayer.currentTime = time;
        });
        
        audioPlayer.addEventListener('timeupdate', () => {
            const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressBar.value = progress || 0;
            currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
        });
        
        audioPlayer.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audioPlayer.duration);
        });
        
        audioPlayer.addEventListener('ended', () => {
            if (!isRepeat) {
                nextBtn.click();
            }
        });
        
        // Initialize volume
        audioPlayer.volume = 0.8;
        
        // Load some popular tracks on start
        searchTracks('popular');
    </script>
</body>
</html>
